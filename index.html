<!DOCTYPE html>
<html class="dark" lang="zh-CN">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>
    <title>Eric的健身助手</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#B5E18B",
                        "tertiary": "#F0FFC2",
                        "background": "#28396C",
                        "surface": "#28396C",
                        "surface-container-low": "rgba(234,230,188,0.08)",
                        "surface-container": "rgba(234,230,188,0.12)",
                        "surface-container-high": "rgba(234,230,188,0.18)",
                        "surface-container-highest": "rgba(234,230,188,0.22)",
                        "on-surface": "#F0FFC2",
                        "on-surface-variant": "#EAE6BC",
                        "on-tertiary-container": "#28396C",
                        "error": "#ffb4ab",
                    },
                    fontFamily: {
                        "headline": ["Space Grotesk"],
                        "body": ["Manrope"],
                    }
                }
            }
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        html, body { background-color: #1a2754; color: #F0FFC2; }
        body { min-height: 100dvh; position: relative; overflow-x: hidden; padding-bottom: 6.5rem; }

        /* Ambient gradient orbs */
        body::before, body::after {
            content: ""; position: fixed; border-radius: 50%; filter: blur(80px); pointer-events: none; z-index: 0;
            animation: orb-float 18s ease-in-out infinite;
        }
        body::before { width: 420px; height: 420px; background: radial-gradient(circle, rgba(181,225,139,0.30), transparent 70%); top: -120px; left: -80px; }
        body::after { width: 360px; height: 360px; background: radial-gradient(circle, rgba(240,255,194,0.15), transparent 70%); bottom: -100px; right: -80px; animation-delay: -9s; }
        @keyframes orb-float {
            0%,100% { transform: translate(0,0) scale(1); }
            50% { transform: translate(40px,30px) scale(1.08); }
        }

        :root {
            --c-背: #B5E18B; --bg-背: rgba(181, 225, 139, 0.18);
            --c-胸: #ffb4ab; --bg-胸: rgba(255, 180, 171, 0.18);
            --c-腿: #F0FFC2; --bg-腿: rgba(240, 255, 194, 0.18);
            --c-肩: #EAE6BC; --bg-肩: rgba(234, 230, 188, 0.18);
            --c-手臂: #d8e2ff; --bg-手臂: rgba(216, 226, 255, 0.18);
            --c-其他: #a8cf80; --bg-其他: rgba(168, 207, 128, 0.18);
        }
        .g-背   {color:var(--c-背);  background:var(--bg-背);  border-color:var(--c-背)}
        .g-胸   {color:var(--c-胸);  background:var(--bg-胸);  border-color:var(--c-胸)}
        .g-腿   {color:var(--c-腿);  background:var(--bg-腿);  border-color:var(--c-腿)}
        .g-肩   {color:var(--c-肩);  background:var(--bg-肩);  border-color:var(--c-肩)}
        .g-手臂 {color:var(--c-手臂);background:var(--bg-手臂);border-color:var(--c-手臂)}
        .g-其他 {color:var(--c-其他);background:var(--bg-其他);border-color:var(--c-其他)}

        /* Header safe top */
        .safe-top { padding-top: calc(env(safe-area-inset-top, 0px) + 0.75rem); }
        .pt-safe { padding-top: calc(env(safe-area-inset-top, 0px) + 5.5rem); }

        /* Page transitions */
        .app-page { position: relative; z-index: 1; }
        .app-page.entering main > * { animation: section-in 0.55s cubic-bezier(0.22, 1, 0.36, 1) backwards; }
        .app-page.entering main > *:nth-child(1) { animation-delay: 0.05s; }
        .app-page.entering main > *:nth-child(2) { animation-delay: 0.12s; }
        .app-page.entering main > *:nth-child(3) { animation-delay: 0.19s; }
        .app-page.entering main > *:nth-child(4) { animation-delay: 0.26s; }
        .app-page.entering main > *:nth-child(5) { animation-delay: 0.33s; }
        @keyframes section-in {
            from { opacity: 0; transform: translateY(18px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ============ LIQUID GLASS NAV ============ */
        .liquid-nav {
            position: fixed; left: 50%; transform: translateX(-50%);
            bottom: max(1rem, env(safe-area-inset-bottom));
            display: flex; padding: 6px;
            background: linear-gradient(135deg, rgba(255,255,255,0.10), rgba(255,255,255,0.03));
            border-radius: 9999px;
            backdrop-filter: blur(28px) saturate(180%);
            -webkit-backdrop-filter: blur(28px) saturate(180%);
            border: 1px solid rgba(255,255,255,0.12);
            box-shadow:
                inset 0 1px 0 rgba(255,255,255,0.20),
                inset 0 -1px 0 rgba(0,0,0,0.15),
                0 12px 40px rgba(0,0,0,0.45);
            z-index: 50;
            touch-action: pan-y;
        }
        .liquid-nav .nav-indicator {
            position: absolute; top: 6px; bottom: 6px; left: 0;
            background: linear-gradient(135deg, rgba(181,225,139,0.55), rgba(181,225,139,0.20));
            border-radius: 9999px;
            box-shadow:
                inset 0 1px 0 rgba(255,255,255,0.35),
                inset 0 -1px 0 rgba(0,0,0,0.10),
                0 4px 20px rgba(181,225,139,0.35);
            transition: left 0.45s cubic-bezier(0.32, 1.6, 0.4, 1), width 0.45s cubic-bezier(0.32, 1.6, 0.4, 1);
        }
        .nav-btn {
            position: relative; z-index: 1;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            width: 80px; height: 52px;
            color: rgba(234,230,188,0.55);
            transition: color 0.3s ease;
        }
        .nav-btn.is-active { color: #28396C; }
        .nav-btn .material-symbols-outlined { font-size: 22px; margin-bottom: 1px; }
        .nav-btn span:last-child { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; }

        /* ============ DISC SELECTOR ============ */
        .disc-track {
            display: flex; gap: 0;
            overflow-x: auto; overflow-y: visible;
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
            padding: 30px calc(50vw - 110px);
            -webkit-overflow-scrolling: touch;
        }
        .disc-track::-webkit-scrollbar { display: none; }
        .disc-item {
            flex: 0 0 220px;
            aspect-ratio: 1;
            scroll-snap-align: center;
            display: flex; align-items: center; justify-content: center;
            position: relative;
            transition: transform 0.45s cubic-bezier(0.22, 1, 0.36, 1),
                        opacity 0.45s cubic-bezier(0.22, 1, 0.36, 1),
                        filter 0.45s cubic-bezier(0.22, 1, 0.36, 1);
            transform: scale(0.5);
            opacity: 0.35;
            filter: blur(3px) saturate(0.5);
        }
        .disc-item.is-focus {
            transform: scale(1);
            opacity: 1;
            filter: blur(0) saturate(1);
        }
        .disc-item.is-near {
            transform: scale(0.68);
            opacity: 0.55;
            filter: blur(1.5px) saturate(0.7);
        }
        .disc {
            width: 100%; height: 100%;
            border-radius: 50%;
            background:
                radial-gradient(circle at 50% 50%, var(--disc-c) 5%, #0d1640 6%, #0d1640 8%, var(--disc-c) 9%, transparent 10%),
                repeating-radial-gradient(circle at 50% 50%, rgba(255,255,255,0.04) 0 2px, transparent 2px 6px),
                radial-gradient(circle at 30% 30%, rgba(255,255,255,0.18), transparent 50%),
                radial-gradient(circle at 70% 70%, var(--disc-c-soft), transparent 60%),
                radial-gradient(circle at 50% 50%, #1a2754 60%, #0a1133 100%);
            box-shadow:
                0 0 60px var(--disc-c-glow),
                inset 0 0 0 1px rgba(255,255,255,0.08),
                inset 0 8px 24px rgba(255,255,255,0.06),
                inset 0 -8px 24px rgba(0,0,0,0.3);
            position: relative;
            display: flex; align-items: center; justify-content: center;
        }
        .disc::after {
            content: "";
            position: absolute; inset: 50%; width: 14px; height: 14px;
            margin: -7px;
            border-radius: 50%;
            background: #0a1133;
            box-shadow: inset 0 0 0 2px var(--disc-c);
        }
        .disc-label {
            position: absolute;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 56px;
            font-weight: 700;
            color: #F0FFC2;
            text-shadow: 0 4px 24px rgba(0,0,0,0.6);
            letter-spacing: -0.02em;
            z-index: 2;
            pointer-events: none;
        }
        .disc-item.is-focus .disc {
            animation: disc-spin 14s linear infinite;
        }
        @keyframes disc-spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .disc-item.is-focus .disc-label {
            animation: label-rise 0.5s cubic-bezier(0.22, 1, 0.36, 1);
        }
        @keyframes label-rise {
            from { opacity: 0; transform: scale(0.7); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Detail panel reveals after disc selected */
        #record-detail.is-shown {
            animation: detail-reveal 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
        }
        @keyframes detail-reveal {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Calendar */
        .cal-day {
            aspect-ratio: 1/1; border-radius: 12px; padding: 4px 3px;
            display: flex; flex-direction: column;
            align-items: center; justify-content: flex-start; gap: 3px;
            transition: all .25s cubic-bezier(0.34, 1.56, 0.64, 1);
            border: 1px solid transparent; position: relative;
        }
        .cal-day.has-data { cursor: pointer; background: linear-gradient(135deg, rgba(181,225,139,0.06), rgba(181,225,139,0.02)); border-color: rgba(181,225,139,0.15); }
        .cal-day.has-data:active { transform: scale(.92); box-shadow: 0 0 24px rgba(181,225,139,0.3); }
        .cal-day.is-today { border-color: #B5E18B !important; background: rgba(181,225,139,.12) !important; box-shadow: 0 0 12px rgba(181,225,139,0.25); }
        .cal-day.is-empty { opacity: 0.35; }
        .cal-day-num { font-size: 12px; font-weight: 700; line-height: 1; font-family: 'Space Grotesk', sans-serif; }
        .cal-dots { display: flex; gap: 2px; margin-top: auto; padding-bottom: 2px; }
        .cal-dot { width: 5px; height: 5px; border-radius: 50%; }
        .cal-badge { font-size: 9px; font-weight: 800; padding: 1px 4px; border-radius: 4px; border-width: 1px; border-style: solid; line-height: 1.4; }

        .action-selected { background: rgba(181,225,139,0.18); color: #B5E18B; border-color: #B5E18B; box-shadow: 0 0 12px rgba(181,225,139,0.3); }
        .action-unselected { background: rgba(234,230,188,0.1); color: #EAE6BC; border-color: transparent; }

        input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
        .no-scrollbar::-webkit-scrollbar{display:none}
        .no-scrollbar{-ms-overflow-style:none;scrollbar-width:none}

        @keyframes saved-burst {
            0% { transform: scale(1); box-shadow: 0 0 20px rgba(181,225,139,0.3); }
            40% { transform: scale(1.05); box-shadow: 0 0 60px rgba(181,225,139,0.9), 0 0 120px rgba(181,225,139,0.4); }
            100% { transform: scale(1); box-shadow: 0 0 20px rgba(181,225,139,0.3); }
        }
        .saved-flash { animation: saved-burst 0.6s ease; }

        .modal-sheet { animation: sheet-up 0.35s cubic-bezier(0.22, 1, 0.36, 1); }
        @keyframes sheet-up { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .glass-card {
            background: linear-gradient(135deg, rgba(234,230,188,0.10), rgba(234,230,188,0.04));
            backdrop-filter: blur(20px);
            border: 1px solid rgba(234,230,188,0.12);
            border-radius: 20px;
        }

        /* Mode segment for record page (训练 / 体重) */
        .mode-seg {
            display: inline-flex; padding: 3px;
            background: rgba(234,230,188,0.08);
            border-radius: 9999px;
            border: 1px solid rgba(234,230,188,0.10);
        }
        .mode-seg button {
            padding: 4px 14px; border-radius: 9999px; font-size: 11px; font-weight: 700;
            letter-spacing: 0.08em; color: rgba(234,230,188,0.5);
            transition: all 0.3s ease;
        }
        .mode-seg button.is-active {
            background: rgba(181,225,139,0.20);
            color: #B5E18B;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.15);
        }

        /* Bubble cloud for frequency */
        .freq-cloud {
            display: flex; flex-wrap: wrap; align-items: center; justify-content: center; gap: 10px;
            padding: 16px 8px;
        }
        .freq-bubble {
            border-radius: 50%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: transform 0.5s cubic-bezier(0.22, 1, 0.36, 1);
            border: 1.5px solid;
            backdrop-filter: blur(8px);
        }
        .freq-bubble:active { transform: scale(0.92); }
        .freq-bubble .fb-num { font-family: 'Space Grotesk', sans-serif; font-weight: 800; line-height: 1; }
        .freq-bubble .fb-lbl { font-size: 10px; font-weight: 700; opacity: 0.85; margin-top: 2px; }
    </style>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="apple-touch-icon.png" type="image/png">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Fitness">
</head>
<body class="font-body">

<!-- ============================================== -->
<!-- LIQUID GLASS NAV -->
<nav class="liquid-nav" id="liquid-nav">
    <div class="nav-indicator" id="nav-indicator"></div>
    <button onclick="navTo('record')" class="nav-btn is-active" id="nav-record">
        <span class="material-symbols-outlined">fitness_center</span>
        <span>训练</span>
    </button>
    <button onclick="navTo('schedule')" class="nav-btn" id="nav-schedule">
        <span class="material-symbols-outlined">calendar_today</span>
        <span>打卡</span>
    </button>
    <button onclick="navTo('index')" class="nav-btn" id="nav-index">
        <span class="material-symbols-outlined">sports_tennis</span>
        <span>专项</span>
    </button>
</nav>

<!-- BADMINTON TIMER FAB -->
<div id="toggle-training-btn-container" class="fixed bottom-28 right-6 z-50 hidden">
  <button id="toggle-training-btn" class="w-16 h-16 bg-primary text-[#28396C] rounded-full shadow-[0px_12px_24px_rgba(181,225,139,0.4)] flex items-center justify-center active:scale-90 transition-all">
    <span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
  </button>
</div>

<!-- ============================================== -->
<!-- PAGE: RECORD (训练) -->
<div id="page-record" class="app-page">
  <header class="fixed top-0 w-full z-40 flex justify-between items-center px-5 bg-[#1a2754]/85 backdrop-blur-xl border-b border-[#EAE6BC]/10 safe-top pb-3">
    <div class="mode-seg" id="mode-seg">
      <button data-mode="strength" class="is-active">力量</button>
      <button data-mode="weight">体重</button>
    </div>
    <div class="text-xs text-[#EAE6BC]/70 font-medium" id="date-display"></div>
  </header>

  <main class="pt-safe max-w-lg mx-auto">
    <!-- DISC SELECTOR -->
    <section id="disc-section" class="px-0">
      <div class="disc-track" id="disc-track">
        <div class="disc-item" data-group="背"   style="--disc-c:#B5E18B; --disc-c-soft:rgba(181,225,139,0.4); --disc-c-glow:rgba(181,225,139,0.45)"><div class="disc"></div><div class="disc-label">背</div></div>
        <div class="disc-item" data-group="胸"   style="--disc-c:#ffb4ab; --disc-c-soft:rgba(255,180,171,0.4); --disc-c-glow:rgba(255,180,171,0.45)"><div class="disc"></div><div class="disc-label">胸</div></div>
        <div class="disc-item" data-group="腿"   style="--disc-c:#F0FFC2; --disc-c-soft:rgba(240,255,194,0.4); --disc-c-glow:rgba(240,255,194,0.45)"><div class="disc"></div><div class="disc-label">腿</div></div>
        <div class="disc-item" data-group="肩"   style="--disc-c:#EAE6BC; --disc-c-soft:rgba(234,230,188,0.4); --disc-c-glow:rgba(234,230,188,0.45)"><div class="disc"></div><div class="disc-label">肩</div></div>
        <div class="disc-item" data-group="手臂" style="--disc-c:#d8e2ff; --disc-c-soft:rgba(216,226,255,0.4); --disc-c-glow:rgba(216,226,255,0.45)"><div class="disc"></div><div class="disc-label">手臂</div></div>
        <div class="disc-item" data-group="其他" style="--disc-c:#a8cf80; --disc-c-soft:rgba(168,207,128,0.4); --disc-c-glow:rgba(168,207,128,0.45)"><div class="disc"></div><div class="disc-label">其他</div></div>
      </div>
      <div class="text-center -mt-2 mb-4 px-6">
        <button id="confirm-group-btn" class="text-xs font-bold tracking-widest uppercase text-primary border border-primary/40 px-5 py-2 rounded-full active:scale-95 transition">
          选定 <span id="current-group-display">背</span> →
        </button>
      </div>
    </section>

    <!-- DETAIL (revealed after group confirmed) -->
    <section id="record-detail" class="px-4 space-y-5 hidden">
      <div class="flex items-center justify-between px-1">
        <div class="flex items-center gap-2">
          <span class="cal-badge border" id="group-pill">背</span>
          <span class="text-[10px] font-bold text-[#EAE6BC]/60 uppercase tracking-widest">已选部位</span>
        </div>
        <button id="back-to-disc" class="text-xs text-[#EAE6BC]/60 underline decoration-[#EAE6BC]/30 active:text-primary">← 换部位</button>
      </div>

      <div class="glass-card p-4">
        <p class="text-[10px] font-bold text-[#EAE6BC]/70 uppercase tracking-widest mb-3">选择动作</p>
        <div class="flex flex-wrap gap-2 mb-3" id="action-chips"></div>
        <div class="flex gap-2 mt-2">
          <input type="text" id="custom-action-input" placeholder="或自己输入动作名称…" class="flex-1 bg-surface-container-highest border border-[#EAE6BC]/20 rounded-lg px-3 py-2 text-sm text-on-surface focus:outline-none focus:border-primary transition-all placeholder:text-[#EAE6BC]/50"/>
          <button id="custom-action-btn" class="px-3 py-2 rounded-lg bg-primary/20 text-primary border border-primary/50 text-sm font-bold active:scale-95 transition-all">确认</button>
        </div>
      </div>

      <div class="glass-card p-4">
        <div class="grid grid-cols-3 gap-3">
          <div class="space-y-1">
            <label class="block text-[10px] font-bold text-[#EAE6BC]/70 uppercase text-center">负重 KG</label>
            <input type="number" id="input-weight" placeholder="25" class="w-full bg-surface-container-highest border-none rounded-lg p-3 text-center text-2xl font-headline font-bold text-primary focus:ring-2 focus:ring-primary outline-none transition-all"/>
          </div>
          <div class="space-y-1">
            <label class="block text-[10px] font-bold text-[#EAE6BC]/70 uppercase text-center">单组次数</label>
            <input type="number" id="input-reps" placeholder="10" class="w-full bg-surface-container-highest border-none rounded-lg p-3 text-center text-2xl font-headline font-bold text-primary focus:ring-2 focus:ring-primary outline-none transition-all"/>
          </div>
          <div class="space-y-1">
            <label class="block text-[10px] font-bold text-[#EAE6BC]/70 uppercase text-center">完成组数</label>
            <input type="number" id="input-sets" placeholder="4" class="w-full bg-surface-container-highest border-none rounded-lg p-3 text-center text-2xl font-headline font-bold text-primary focus:ring-2 focus:ring-primary outline-none transition-all"/>
          </div>
        </div>
      </div>

      <button id="save-btn" class="w-full py-4 rounded-2xl bg-primary text-on-tertiary-container font-headline font-bold text-lg tracking-widest shadow-[0_0_20px_rgba(181,225,139,0.3)] active:scale-[0.97] transition-transform">
        ＋ 录入今日账本
      </button>

      <section id="today-log-section" class="hidden">
        <div class="flex items-center justify-between mb-3">
          <p class="text-[10px] font-bold text-[#EAE6BC]/70 uppercase tracking-widest">今日已记录</p>
          <span id="today-count" class="text-primary text-xs font-bold"></span>
        </div>
        <div id="today-log" class="space-y-2"></div>
      </section>

      <div class="flex justify-center gap-6 pt-2">
        <button id="btn-export" class="text-xs text-[#EAE6BC]/50 font-bold underline decoration-[#EAE6BC]/20 active:text-primary transition-colors">↑ 导出备份</button>
        <button id="btn-import" class="text-xs text-[#EAE6BC]/50 font-bold underline decoration-[#EAE6BC]/20 active:text-primary transition-colors">↓ 导入备份</button>
        <input type="file" id="import-file" accept="application/json,.json" class="hidden"/>
      </div>
    </section>

    <!-- WEIGHT MODE -->
    <section id="weight-mode" class="px-4 space-y-5 hidden">
      <div class="glass-card p-5 text-center">
        <p class="text-[10px] font-bold text-[#EAE6BC]/70 uppercase tracking-widest mb-3">今日体重</p>
        <div class="flex items-baseline justify-center gap-2 mb-4">
          <input type="number" id="weight-input" step="0.1" placeholder="--" class="bg-transparent border-none w-32 text-5xl font-headline font-bold text-primary text-center focus:outline-none"/>
          <span class="text-base text-[#EAE6BC]/70 font-bold">KG</span>
        </div>
        <button id="weight-save-btn" class="px-8 py-3 rounded-full bg-primary text-on-tertiary-container font-bold tracking-widest text-sm active:scale-95 transition-transform">
          记录

<script>
// --- Data ---
const A2G = { '直臂下压':'背','坐姿划船':'背','高位下拉':'背','坐拉':'背','辅助引体':'背','坐姿下拉(左右)':'背','坐姿下拉':'背',
            '卧推':'胸','握推':'胸','辅助下胸':'胸','上斜哑铃':'胸','下胸':'胸','辅助推走':'胸','龙门架飞鸟':'胸','飞鸟超级组':'胸','卧推组合':'胸',
            '深蹲':'腿','坐姿髋内收':'腿','髋外展':'腿','健步蹲':'腿','弓箭蹲':'腿','髋内收':'腿',
            '拉绳索':'肩','绳索面拉':'肩','侧平举':'肩','龙门架侧平举':'肩','反向蝴蝶':'肩','推肩(躺)':'肩','坐姿反向飞鸟':'肩',
            '二头弯举':'手臂','锤式弯举':'手臂','三头下压':'手臂','窄距俯卧撑':'手臂'};
function getRawRecords(){ try { return JSON.parse(localStorage.getItem('gym_records')||'[]'); } catch(e){ return []; } }
function getRecords(){ return getRawRecords().map(r=>({...r, group: r.group||A2G[r.action]||'其他'})); }
function saveRecord(r){ try { const raw=getRawRecords(); raw.push(r); localStorage.setItem('gym_records', JSON.stringify(raw)); } catch(e){ console.error(e); } }
function deleteRecord(key){ try { const raw=getRawRecords().filter(r=>(r.id||r.date)!==key); localStorage.setItem('gym_records', JSON.stringify(raw)); } catch(e){ console.error(e); } }

function getWeightRecords(){ try { return JSON.parse(localStorage.getItem('weight_records')||'[]'); } catch(e){ return []; } }
function saveWeight(w){ const arr=getWeightRecords(); arr.push({date:new Date().toISOString(), weight:w}); localStorage.setItem('weight_records', JSON.stringify(arr)); }

// --- UI ---
function showToast(msg, type='info'){
    const t=document.createElement('div');
    const bg = type==='success'?'rgba(181,225,139,0.95)' : type==='error'?'rgba(255,180,171,0.95)' : 'rgba(40,57,108,0.95)';
    const fg = type==='info'?'#F0FFC2':'#28396C';
    t.style.cssText = `position:fixed;top:calc(env(safe-area-inset-top,0px) + 80px);left:50%;transform:translateX(-50%) translateY(-20px) scale(0.9);background:${bg};color:${fg};padding:12px 22px;border-radius:999px;font-size:13px;font-weight:700;z-index:9999;backdrop-filter:blur(12px);box-shadow:0 12px 32px rgba(0,0,0,0.4);opacity:0;transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1);pointer-events:none;max-width:80vw;text-align:center;`;
    t.textContent=msg;
    document.body.appendChild(t);
    requestAnimationFrame(()=>{ t.style.opacity='1'; t.style.transform='translateX(-50%) translateY(0) scale(1)'; });
    setTimeout(()=>{ t.style.opacity='0'; t.style.transform='translateX(-50%) translateY(-20px) scale(0.9)'; setTimeout(()=>t.remove(),300); }, 2000);
}
function vibrate(pattern=20){ if(navigator.vibrate) navigator.vibrate(pattern); }

// --- NAV ---
const PageModules = {};
const PAGE_ORDER = ['record','schedule','index'];
let currentPageIdx = 0;

function updateNavIndicator(){
    const nav = document.getElementById('liquid-nav');
    const indicator = document.getElementById('nav-indicator');
    const btn = document.getElementById('nav-'+PAGE_ORDER[currentPageIdx]);
    if(!btn || !indicator) return;
    const navRect = nav.getBoundingClientRect();
    const btnRect = btn.getBoundingClientRect();
    indicator.style.left = (btnRect.left - navRect.left) + 'px';
    indicator.style.width = btnRect.width + 'px';
}

function navTo(pageId){
    const idx = PAGE_ORDER.indexOf(pageId);
    if(idx === -1) return;
    currentPageIdx = idx;
    document.querySelectorAll('.app-page').forEach(p => { p.classList.add('hidden'); p.classList.remove('entering'); });
    const page = document.getElementById('page-'+pageId);
    page.classList.remove('hidden');
    void page.offsetWidth;
    page.classList.add('entering');
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('is-active'));
    document.getElementById('nav-'+pageId).classList.add('is-active');
    updateNavIndicator();
    const timerBtn = document.getElementById('toggle-training-btn-container');
    if(timerBtn) timerBtn.style.display = (pageId==='index')?'block':'none';
    vibrate(10);
    if(PageModules[pageId]?.onEnter) PageModules[pageId].onEnter();
}

document.addEventListener("DOMContentLoaded", () => {

// Initial indicator position
requestAnimationFrame(()=>{ updateNavIndicator(); });
window.addEventListener('resize', updateNavIndicator);

// Swipe on nav to switch tabs
(function(){
    const nav = document.getElementById('liquid-nav');
    let startX=0, startY=0, tracking=false;
    nav.addEventListener('touchstart', e=>{ startX=e.touches[0].clientX; startY=e.touches[0].clientY; tracking=true; }, {passive:true});
    nav.addEventListener('touchend', e=>{
        if(!tracking) return; tracking=false;
        const dx = e.changedTouches[0].clientX - startX;
        const dy = e.changedTouches[0].clientY - startY;
        if(Math.abs(dx) < 30 || Math.abs(dx) < Math.abs(dy)*1.5) return;
        if(dx < 0 && currentPageIdx < PAGE_ORDER.length-1) navTo(PAGE_ORDER[currentPageIdx+1]);
        else if(dx > 0 && currentPageIdx > 0) navTo(PAGE_ORDER[currentPageIdx-1]);
    }, {passive:true});
})();

// ====== RECORD (训练) ======
PageModules['record'] = (function(){
    const now = new Date();
    document.getElementById('date-display').textContent = now.toLocaleDateString('zh-CN',{month:'long',day:'numeric',weekday:'short'});

    const library = {
        "背":["直臂下压","坐姿划船","高位下拉","坐拉","辅助引体","坐姿下拉(左右)"],
        "胸":["卧推","握推","辅助下胸","上斜哑铃","下胸","辅助推走","龙门架飞鸟","飞鸟超级组"],
        "腿":["深蹲","坐姿髋内收","髋外展","健步蹲","弓箭蹲","髋内收"],
        "肩":["拉绳索","绳索面拉","侧平举","龙门架侧平举","反向蝴蝶","推肩(躺)","坐姿反向飞鸟"],
        "手臂":["二头弯举","锤式弯举","三头下压","窄距俯卧撑"],
        "其他":["平板支撑","卷腹","俯卧撑","引体向上","波比跳"]
    };
    let currentGroup = "背", currentAction = "", confirmed = false;

    // === DISC SELECTOR LOGIC ===
    const track = document.getElementById('disc-track');
    const discs = Array.from(track.querySelectorAll('.disc-item'));
    function updateFocus(){
        const trackRect = track.getBoundingClientRect();
        const center = trackRect.left + trackRect.width/2;
        let minDist = Infinity, focusIdx = 0;
        discs.forEach((d,i)=>{
            const r = d.getBoundingClientRect();
            const dist = Math.abs((r.left + r.width/2) - center);
            if(dist < minDist){ minDist = dist; focusIdx = i; }
        });
        discs.forEach((d,i)=>{
            d.classList.remove('is-focus','is-near');
            if(i === focusIdx) d.classList.add('is-focus');
            else if(Math.abs(i-focusIdx) === 1) d.classList.add('is-near');
        });
        const g = discs[focusIdx].dataset.group;
        if(g !== currentGroup){
            currentGroup = g;
            document.getElementById('current-group-display').textContent = g;
            vibrate(6);
        }
    }
    let scrollTimeout;
    track.addEventListener('scroll', ()=>{
        clearTimeout(scrollTimeout);
        scrollTimeout = setTimeout(updateFocus, 30);
    }, {passive:true});
    // Tap a disc → scroll it to center
    discs.forEach((d,i)=>{
        d.addEventListener('click', ()=>{
            const r = d.getBoundingClientRect();
            const trackRect = track.getBoundingClientRect();
            const offset = (r.left + r.width/2) - (trackRect.left + trackRect.width/2);
            track.scrollBy({ left: offset, behavior: 'smooth' });
        });
    });

    // Confirm group → reveal detail
    function showDetail(){
        confirmed = true;
        document.getElementById('disc-section').classList.add('hidden');
        const detail = document.getElementById('record-detail');
        detail.classList.remove('hidden');
        detail.classList.add('is-shown');
        const pill = document.getElementById('group-pill');
        pill.textContent = currentGroup;
        pill.className = 'cal-badge border g-'+currentGroup;
        renderChips(currentGroup);
        renderTodayLog();
        vibrate(15);
    }
    function showDisc(){
        confirmed = false;
        currentAction = '';
        document.getElementById('record-detail').classList.add('hidden');
        document.getElementById('disc-section').classList.remove('hidden');
        // Re-focus current
        setTimeout(updateFocus, 50);
    }
    document.getElementById('confirm-group-btn').addEventListener('click', showDetail);
    document.getElementById('back-to-disc').addEventListener('click', showDisc);

    function renderChips(group){
        const container = document.getElementById('action-chips'); container.innerHTML = '';
        const records = getRecords();
        const used = [...new Set(records.filter(r => r.group===group || (r.action && library[group]?.includes(r.action))).map(r=>r.action))];
        const all = [...new Set([...(library[group]||[]), ...used])];
        all.forEach(name=>{
            const btn = document.createElement('button');
            btn.className = 'action-chip action-unselected px-3 py-1.5 rounded-lg text-xs font-bold border transition-all active:scale-95';
            btn.textContent = name;
            btn.addEventListener('click', ()=> selectAction(name, btn));
            container.appendChild(btn);
        });
    }
    function selectAction(name, btn){
        document.querySelectorAll('.action-chip').forEach(b=>{ b.classList.remove('action-selected'); b.classList.add('action-unselected'); });
        if(btn) btn.classList.replace('action-unselected','action-selected');
        currentAction = name;
        document.getElementById('custom-action-input').value = name;
        vibrate(10);
    }
    document.getElementById('custom-action-btn').addEventListener('click', ()=>{
        const val = document.getElementById('custom-action-input').value.trim();
        if(val) selectAction(val, null);
    });

    function renderTodayLog(){
        const today = new Date().toDateString();
        const todayRecs = getRecords().filter(r => new Date(r.date).toDateString() === today);
        const section = document.getElementById('today-log-section'), logDiv = document.getElementById('today-log');
        if(todayRecs.length === 0){ section.classList.add('hidden'); return; }
        section.classList.remove('hidden');
        document.getElementById('today-count').textContent = `${todayRecs.length} 项`;
        logDiv.innerHTML = '';
        todayRecs.slice().reverse().forEach(r=>{
            const vol = (r.volume/1000).toFixed(2);
            const time = new Date(r.date).toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});
            const el = document.createElement('div');
            el.className = 'flex items-center justify-between glass-card !rounded-xl px-4 py-3 gap-2';
            el.innerHTML = `<div class="min-w-0 flex-1"><div class="flex items-center gap-2"><span class="cal-badge border g-${r.group}">${r.group}</span><span class="font-bold text-sm text-[#F0FFC2] truncate">${r.action}</span></div><div class="text-[10px] text-[#EAE6BC]/60 mt-1">${time}</div></div>
                            <div class="text-right flex-shrink-0"><span class="text-sm font-headline font-bold text-primary">${r.weight}KG × ${r.reps} × ${r.sets}</span><span class="text-[10px] text-[#EAE6BC] block">${vol} Tons</span></div>
                            <button class="del-record-btn flex-shrink-0 w-8 h-8 rounded-full bg-error/10 text-error flex items-center justify-center active:scale-90 transition-transform"><span class="material-symbols-outlined text-base">close</span></button>`;
            el.querySelector('.del-record-btn').addEventListener('click',(e)=>{
                e.stopPropagation();
                if(!confirm(`删除「${r.action} ${r.weight}KG × ${r.reps} × ${r.sets}」？`)) return;
                deleteRecord(r.id||r.date);
                vibrate([10,30,10]);
                renderTodayLog();
                showToast('已删除','success');
            });
            logDiv.appendChild(el);
        });
    }

    const iW = document.getElementById('input-weight'), iR = document.getElementById('input-reps'), iS = document.getElementById('input-sets');
    document.getElementById('save-btn').addEventListener('click', ()=>{
        const action = currentAction || document.getElementById('custom-action-input').value.trim();
        if(!action || !iW.value || !iR.value || !iS.value){
            vibrate([50,30,50]);
            return alert('请选择动作并填写重量、次数、组数');
        }
        const r = { id:Date.now(), date:new Date().toISOString(), action, group:currentGroup, weight:parseFloat(iW.value), reps:parseInt(iR.value), sets:parseInt(iS.value), volume:(parseFloat(iW.value)*parseInt(iR.value)*parseInt(iS.value)) };
        saveRecord(r);
        const btn = document.getElementById('save-btn');
        const today = new Date().toDateString();
        const cnt = getRecords().filter(x => new Date(x.date).toDateString() === today).length;
        btn.textContent = '✓ 已记录！';
        btn.classList.add('saved-flash');
        vibrate([20,40,30]);
        showToast(`已添加 · 今日第 ${cnt} 项`,'success');
        renderTodayLog();
        iW.value = '';
        setTimeout(()=>{ btn.textContent = '＋ 录入今日账本'; btn.classList.remove('saved-flash'); }, 1500);
    });

    document.getElementById('btn-export').addEventListener('click', ()=>{
        const raw = localStorage.getItem('gym_records')||'[]';
        const blob = new Blob([raw],{type:'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = `fitness-backup-${new Date().toISOString().slice(0,10)}.json`;
        document.body.appendChild(a); a.click();
        setTimeout(()=>{ document.body.removeChild(a); URL.revokeObjectURL(url); }, 100);
        vibrate(15);
        showToast('已导出备份文件');
    });
    document.getElementById('btn-import').addEventListener('click', ()=> document.getElementById('import-file').click());
    document.getElementById('import-file').addEventListener('change', (e)=>{
        const file = e.target.files[0]; if(!file) return;
        const reader = new FileReader();
        reader.onload = (ev)=>{
            try {
                let parsed = JSON.parse(ev.target.result);
                const arr = Array.isArray(parsed) ? parsed : (parsed.gym_records || null);
                if(!Array.isArray(arr)){ alert('文件格式错误'); return; }
                if(!confirm(`将导入 ${arr.length} 条记录，覆盖当前数据。确认？`)) return;
                localStorage.setItem('gym_records', JSON.stringify(arr));
                vibrate([20,30,20,30,20]);
                showToast(`已导入 ${arr.length} 条`,'success');
                setTimeout(()=> location.reload(), 800);
            } catch(err){ alert('解析失败: '+err.message); }
            e.target.value = '';
        };
        reader.readAsText(file);
    });

    // === MODE SWITCH (力量 / 体重) ===
    const segBtns = document.querySelectorAll('#mode-seg button');
    segBtns.forEach(b=>{
        b.addEventListener('click', ()=>{
            segBtns.forEach(x=>x.classList.remove('is-active'));
            b.classList.add('is-active');
            const mode = b.dataset.mode;
            vibrate(10);
            const discSec = document.getElementById('disc-section');
            const detail = document.getElementById('record-detail');
            const weightSec = document.getElementById('weight-mode');
            if(mode === 'weight'){
                discSec.classList.add('hidden');
                detail.classList.add('hidden');
                weightSec.classList.remove('hidden');
                renderWeightChart();
            } else {
                weightSec.classList.add('hidden');
                if(confirmed){ detail.classList.remove('hidden'); }
                else { discSec.classList.remove('hidden'); setTimeout(updateFocus, 50); }
            }
        });
    });

    // === WEIGHT mode ===
    function renderWeightChart(){
        const arr = getWeightRecords();
        const svg = document.getElementById('weight-chart');
        const hist = document.getElementById('weight-history');
        const trend = document.getElementById('weight-trend');
        if(!arr.length){
            svg.innerHTML = '<text x="160" y="60" text-anchor="middle" fill="rgba(234,230,188,0.3)" font-size="11">暂无体重记录</text>';
            hist.innerHTML = '';
            trend.textContent = '';
            return;
        }
        const sorted = arr.slice().sort((a,b)=> new Date(a.date)-new Date(b.date)).slice(-30);
        const ws = sorted.map(r=>r.weight);
        const minW = Math.min(...ws), maxW = Math.max(...ws), rng = Math.max(0.5, maxW-minW);
        const pts = sorted.map((r,i)=>{
            const x = (i/Math.max(1,sorted.length-1)) * 300 + 10;
            const y = 100 - ((r.weight - minW)/rng) * 80;
            return `${x},${y}`;
        }).join(' ');
        svg.innerHTML = `
            <defs><linearGradient id="wg" x1="0" x2="0" y1="0" y2="1">
                <stop offset="0%" stop-color="#B5E18B" stop-opacity="0.6"/>
                <stop offset="100%" stop-color="#B5E18B" stop-opacity="0"/>
            </linearGradient></defs>
            <polyline points="${pts}" fill="none" stroke="#B5E18B" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="filter:drop-shadow(0 0 4px #B5E18B);"/>
            <polygon points="${pts} ${10 + 300},100 10,100" fill="url(#wg)"/>
        `;
        const last = ws[ws.length-1], first = ws[0], diff = (last-first).toFixed(1);
        trend.textContent = sorted.length<2?`${last} KG`:`${diff>=0?'+':''}${diff} KG · 当前 ${last}`;
        hist.innerHTML = '';
        sorted.slice().reverse().slice(0,5).forEach(r=>{
            const d = new Date(r.date).toLocaleDateString('zh-CN',{month:'numeric',day:'numeric'});
            const row = document.createElement('div');
            row.className = 'flex justify-between text-xs px-3 py-1.5 bg-surface-container-low rounded-lg';
            row.innerHTML = `<span class="text-[#EAE6BC]/70">${d}</span><span class="font-headline font-bold text-primary">${r.weight} KG</span>`;
            hist.appendChild(row);
        });
    }
    document.getElementById('weight-save-btn').addEventListener('click', ()=>{
        const v = parseFloat(document.getElementById('weight-input').value);
        if(!v || v<20 || v>300){ vibrate([50,30,50]); return alert('请输入有效体重'); }
        saveWeight(v);
        vibrate([20,40,30]);
        showToast(`已记录 ${v} KG`,'success');
        document.getElementById('weight-input').value = '';
        renderWeightChart();
    });

    // Init: center the first disc on first render
    requestAnimationFrame(()=>{
        setTimeout(updateFocus, 100);
    });

    return { onEnter: ()=>{
        if(document.querySelector('#mode-seg .is-active').dataset.mode === 'weight'){
            renderWeightChart();
        } else if(confirmed){
            renderChips(currentGroup);
            renderTodayLog();
        } else {
            setTimeout(updateFocus, 50);
        }
    } };
})();

// ====== SCHEDULE (打卡 - calendar only) ======
PageModules['schedule'] = (function(){
    let dayMap = {}; const today = new Date(); let viewYear = today.getFullYear(), viewMonth = today.getMonth();
    function fmtKey(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }

    function buildMap(){
        dayMap = {};
        getRecords().forEach(r=>{
            const key = fmtKey(new Date(r.date));
            if(!dayMap[key]) dayMap[key] = { groups:new Set(), exercises:[] };
            dayMap[key].groups.add(r.group); dayMap[key].exercises.push(r);
        });
    }
    function calcStreak(){
        let streak = 0; const cursor = new Date(today);
        if(!dayMap[fmtKey(cursor)]) cursor.setDate(cursor.getDate()-1);
        while(dayMap[fmtKey(cursor)]){ streak++; cursor.setDate(cursor.getDate()-1); }
        return streak;
    }
    function renderCal(){
        document.getElementById('month-label').textContent = `${viewYear}年${viewMonth+1}月`;
        const grid = document.getElementById('calendar-grid'); grid.innerHTML = '';
        const firstDay = new Date(viewYear,viewMonth,1).getDay();
        const daysInMonth = new Date(viewYear,viewMonth+1,0).getDate();
        for(let i=0;i<firstDay;i++) grid.appendChild(Object.assign(document.createElement('div'),{className:'cal-day'}));
        for(let d=1;d<=daysInMonth;d++){
            const key = `${viewYear}-${String(viewMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const data = dayMap[key], isToday = (fmtKey(today)===key), isFuture = new Date(viewYear,viewMonth,d)>today;
            const el = document.createElement('div');
            el.className = `cal-day ${isToday?'is-today':''} ${data?'has-data':isFuture?'':'is-empty'}`;
            const num = document.createElement('div');
            num.className = `cal-day-num ${isToday?'text-primary':isFuture?'text-[#EAE6BC]/30':data?'text-[#F0FFC2]':'text-[#EAE6BC]/40'}`;
            num.textContent = d; el.appendChild(num);
            if(data){
                const dots = document.createElement('div'); dots.className = 'cal-dots';
                [...data.groups].slice(0,4).forEach(g=>{
                    const dot = document.createElement('div'); dot.className = 'cal-dot'; dot.style.background = `var(--c-${g})`; dots.appendChild(dot);
                });
                el.appendChild(dots);
                el.addEventListener('click', ()=>{ vibrate(12); openModal(key,d,viewMonth+1,viewYear,data); });
            }
            grid.appendChild(el);
        }
        let trainDays=0, freq={};
        const upToDay = (viewYear===today.getFullYear()&&viewMonth===today.getMonth())?today.getDate():daysInMonth;
        for(let d=1;d<=upToDay;d++){
            const k = `${viewYear}-${String(viewMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            if(dayMap[k]){ trainDays++; dayMap[k].groups.forEach(g=>freq[g]=(freq[g]||0)+1); }
        }
        document.getElementById('streak-count').textContent = calcStreak();
        document.getElementById('month-count').textContent = trainDays;
        document.getElementById('rest-days').textContent = upToDay - trainDays;

        // Frequency bubble cloud
        const cloud = document.getElementById('freq-cloud'); cloud.innerHTML = '';
        const groups = ['背','胸','腿','肩','手臂','其他'];
        const maxFreq = Math.max(1, ...groups.map(g=>freq[g]||0));
        groups.forEach(g=>{
            const cnt = freq[g] || 0;
            const size = 50 + (cnt/maxFreq) * 50; // 50–100 px
            const fontSize = 16 + (cnt/maxFreq) * 18; // 16–34
            const op = cnt === 0 ? 0.3 : 0.6 + (cnt/maxFreq) * 0.4;
            const b = document.createElement('div');
            b.className = `freq-bubble g-${g}`;
            b.style.width = b.style.height = size + 'px';
            b.style.opacity = op;
            b.innerHTML = `<span class="fb-num" style="font-size:${fontSize}px">${cnt}</span><span class="fb-lbl">${g}</span>`;
            cloud.appendChild(b);
        });
    }
    function openModal(key,day,month,year,data){
        document.getElementById('modal-date').textContent = `${year}年${month}月${day}日`;
        const content = document.getElementById('modal-content'); content.innerHTML = '';
        const tags = document.createElement('div'); tags.className = 'flex gap-2 flex-wrap mb-3';
        [...data.groups].forEach(g=>{ const t=document.createElement('span'); t.className = `cal-badge border g-${g} text-sm py-1 px-3`; t.textContent = g; tags.appendChild(t); });
        content.appendChild(tags);
        const totalVol = (data.exercises.reduce((s,r)=>s+(r.volume||0),0)/1000).toFixed(2);
        const sum = document.createElement('div');
        sum.className = 'grid grid-cols-2 gap-3 mb-4';
        sum.innerHTML = `<div class="glass-card p-3 text-center"><div class="text-xl font-headline font-bold text-primary">${data.exercises.length}</div><div class="text-[9px] text-[#EAE6BC]/70 uppercase tracking-widest">项动作</div></div>
                         <div class="glass-card p-3 text-center"><div class="text-xl font-headline font-bold text-primary">${totalVol}</div><div class="text-[9px] text-[#EAE6BC]/70 uppercase tracking-widest">Tons</div></div>`;
        content.appendChild(sum);
        data.exercises.forEach(r=>{
            const time = new Date(r.date).toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});
            const row = document.createElement('div');
            row.className = 'flex items-center justify-between bg-surface-container-highest rounded-lg px-3 py-2.5 mt-2 border border-[#EAE6BC]/10';
            row.innerHTML = `<div class="flex-1 min-w-0"><div class="text-sm font-bold text-[#F0FFC2] truncate">${r.action}</div><div class="text-[10px] text-[#EAE6BC]/60">${time}</div></div>
                            <div class="text-right"><div class="text-xs font-headline font-bold text-primary">${r.weight}KG × ${r.reps} × ${r.sets}</div><div class="text-[10px] text-[#EAE6BC]/70">${(r.volume/1000).toFixed(2)} Tons</div></div>`;
            content.appendChild(row);
        });
        document.getElementById('modal').classList.replace('hidden','flex');
    }
    document.getElementById('modal-close').addEventListener('click', ()=> document.getElementById('modal').classList.replace('flex','hidden'));
    document.getElementById('modal-overlay').addEventListener('click', ()=> document.getElementById('modal').classList.replace('flex','hidden'));
    document.getElementById('prev-month').addEventListener('click', ()=>{ if(--viewMonth<0){viewMonth=11;viewYear--;} vibrate(10); renderCal(); });
    document.getElementById('next-month').addEventListener('click', ()=>{ if(++viewMonth>11){viewMonth=0;viewYear++;} vibrate(10); renderCal(); });

    return { onEnter: ()=>{ buildMap(); renderCal(); } };
})();

// ====== BADMINTON ======
PageModules['index'] = (function(){
    const exercises = ["垫步大跳","开合跳","交叉跳","左右启动步","大步","前后左右","左脚V字","右脚V字","摸脚尖","转体跳","高抬腿","后踢腿","全蹲转髋","两边蹬跳","半蹲跳","鸭子跳","小碎步","波比跳"];
    const workTime = 30, restTime = 10;
    let currentIndex=0, currentPhase='WORK', timeRemaining=workTime, globalTime=12*60, isRunning=false, timerInterval=null, audioCtx=null, beatInterval=null, currentBpm=0;
    const uiMain=document.getElementById("main-timer"), uiGlb=document.getElementById("global-timer"), uiPh=document.getElementById("phase-title"),
          uiAct=document.getElementById("current-action"), uiNxt=document.getElementById("next-action"), uiLbl=document.getElementById("current-action-label");
    const playPauseIcon=document.querySelector('#toggle-training-btn span');
    function formatTime(s){ return `${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`; }
    function speak(text,rate=1.1,pitch=1.1){ if(!('speechSynthesis' in window)) return; window.speechSynthesis.cancel(); const u=new SpeechSynthesisUtterance(text); u.lang='zh-CN'; u.rate=rate; u.pitch=pitch; window.speechSynthesis.speak(u); }
    function updateUI(){
        uiMain.textContent = formatTime(timeRemaining); uiGlb.textContent = formatTime(globalTime);
        if(currentPhase==='DONE'){ uiPh.textContent="完成！"; uiAct.textContent="12分钟达成"; uiNxt.textContent="拉伸放松一下吧"; return; }
        if(currentPhase==='WORK'){
            uiPh.textContent = `第 ${currentIndex+1} / 18 组`; uiAct.textContent = exercises[currentIndex]; uiLbl.textContent = "TRAINING";
            uiLbl.className = "inline-block text-[10px] bg-primary text-[#28396C] px-3 py-1 rounded-full font-bold uppercase mb-2 animate-pulse";
            uiMain.className = "font-headline text-[5rem] leading-none font-bold text-[#F0FFC2] drop-shadow-[0_0_15px_#B5E18B]";
        } else {
            uiPh.textContent = "休息"; uiAct.textContent = "调整呼吸"; uiLbl.textContent = "REST";
            uiLbl.className = "inline-block text-[10px] bg-error text-[#28396C] px-3 py-1 rounded-full font-bold uppercase mb-2";
            uiMain.className = "font-headline text-[5rem] leading-none font-bold text-[#EAE6BC]/50";
        }
        uiNxt.textContent = (currentPhase==='WORK'?currentIndex+1:currentIndex)<exercises.length ? `下一个: ${exercises[(currentPhase==='WORK'?currentIndex+1:currentIndex)]}` : "最后一组！";
    }
    function getAudioCtx(){ if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)(); if(audioCtx.state==='suspended') audioCtx.resume(); return audioCtx; }
    function playDrumHit(type){
        const ctx = getAudioCtx(); const osc = ctx.createOscillator(); const gain = ctx.createGain(); osc.connect(gain); gain.connect(ctx.destination);
        if(type==='kick'){ osc.frequency.setValueAtTime(150,ctx.currentTime); osc.frequency.exponentialRampToValueAtTime(40,ctx.currentTime+0.15); gain.gain.setValueAtTime(1.2,ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.2); osc.start(ctx.currentTime); osc.stop(ctx.currentTime+0.2); }
        else if(type==='snare'){ const bs=ctx.sampleRate*0.1; const buf=ctx.createBuffer(1,bs,ctx.sampleRate); const data=buf.getChannelData(0); for(let i=0;i<bs;i++) data[i]=Math.random()*2-1; const src=ctx.createBufferSource(); src.buffer=buf; const sg=ctx.createGain(); src.connect(sg); sg.connect(ctx.destination); sg.gain.setValueAtTime(0.5,ctx.currentTime); sg.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.1); src.start(ctx.currentTime); }
        else { osc.type='square'; osc.frequency.setValueAtTime(1200,ctx.currentTime); gain.gain.setValueAtTime(0.15,ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.03); osc.start(ctx.currentTime); osc.stop(ctx.currentTime+0.04); }
    }
    const patterns={ 110:[[0,'kick'],[2,'hihat'],[4,'snare'],[6,'hihat']], 120:[[0,'kick'],[2,'hihat'],[4,'snare'],[6,'hihat']], 135:[[0,'kick'],[1,'hihat'],[2,'snare'],[3,'hihat'],[4,'kick'],[5,'hihat'],[6,'snare'],[7,'hihat']], 145:[[0,'kick'],[1,'hihat'],[2,'kick'],[3,'snare'],[4,'kick'],[5,'hihat'],[6,'snare'],[7,'hihat']] };
    function startBeat(bpm){ stopBeat(); currentBpm=bpm; if(bpm<=0) return; const pat=patterns[bpm]||patterns[120]; const ms=(60000/bpm)/(pat.length/4); let pos=0; beatInterval=setInterval(()=>{ const hit=pat.find(p=>p[0]===pos); if(hit) playDrumHit(hit[1]); pos=(pos+1)%pat.length; }, ms); }
    function stopBeat(){ if(beatInterval){ clearInterval(beatInterval); beatInterval=null; } }
    const bpmMap=[120,135,145,110];
    document.querySelectorAll('#music-buttons button').forEach((btn,i)=>{
        btn.addEventListener('click', function(){
            document.querySelectorAll('#music-buttons button').forEach(b=>{ b.classList.remove('bg-primary/20','border','border-primary/50','text-primary'); b.classList.add('bg-surface-container-highest/50','text-[#EAE6BC]'); const sp=b.querySelector('span.material-symbols-outlined'); if(sp) sp.style.fontVariationSettings="'FILL' 0"; });
            this.classList.remove('bg-surface-container-highest/50','text-[#EAE6BC]');
            this.classList.add('bg-primary/20','border','border-primary/50','text-primary');
            const sp=this.querySelector('span.material-symbols-outlined'); if(sp) sp.style.fontVariationSettings="'FILL' 1";
            vibrate(10); startBeat(bpmMap[i]);
        });
    });
    document.getElementById('toggle-training-btn').addEventListener('click', ()=>{
        if(currentPhase==='DONE') return;
        vibrate(20);
        if(isRunning){ clearInterval(timerInterval); timerInterval=null; stopBeat(); speak("暂停",1,1); playPauseIcon.textContent='play_arrow'; }
        else {
            speak("开始！",1.2,1.2);
            if(!audioCtx) getAudioCtx();
            if(currentBpm>0) startBeat(currentBpm);
            timerInterval=setInterval(()=>{
                if(globalTime<=0) return;
                timeRemaining--; globalTime--;
                if([3,2,1].includes(timeRemaining)&&currentPhase==='WORK'){ speak(String(timeRemaining),1.3,1.3); vibrate(15); }
                if(timeRemaining<0){
                    vibrate([30,40,30]);
                    if(currentPhase==='WORK'){ currentPhase='REST'; currentIndex++; if(currentIndex>=exercises.length){ currentPhase='DONE'; timeRemaining=0; clearInterval(timerInterval); stopBeat(); updateUI(); speak("完成！",1.1,1.2); vibrate([100,50,100,50,200]); return; } timeRemaining=restTime; speak(`换！${exercises[currentIndex]}`,1.1,1.1); }
                    else { currentPhase='WORK'; timeRemaining=workTime; speak(`${exercises[currentIndex]}！走`,1.2,1.2); }
                }
                updateUI();
            }, 1000);
            playPauseIcon.textContent='pause';
        }
        isRunning=!isRunning;
    });
    updateUI();
    return { onEnter: ()=>{} };
})();

navTo('record');
});

if('serviceWorker' in navigator){
    window.addEventListener('load', ()=>{ navigator.serviceWorker.register('./sw.js').catch(()=>{}); });
}
</script>
